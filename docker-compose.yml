version: '3.8'

services:
  db:
    image: postgres:15
    container_name: serkan_db_container
    restart: always
    environment:
      POSTGRES_DB: serkanSPA-DB      # <--- Nombre de tu BD
      POSTGRES_USER: admin-serkan    # <--- Usuario 
      POSTGRES_PASSWORD: serkan2026 # (Asegúrate de que esta sea la contraseña que usaste)
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: